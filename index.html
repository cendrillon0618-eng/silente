<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0D15">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>Silente</title>
<style>
:root{
  --bg:#0A0D15; --surface:#131826; --surface2:#1A2133;
  --line:#242D42; --text:#E5E9F2; --sub:#8792A8;
  --accent:#C8B27E; --user-bubble:#1C2A45; --danger:#C97B7B;
  --serif:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  --sans:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.75}
button{font-family:var(--sans);border:none;background:none;color:inherit;cursor:pointer;font-size:15px}
textarea,input,select{font-family:var(--sans);font-size:16px;color:var(--text)}

#app{display:flex;flex-direction:column;height:100dvh}

/* ===== header ===== */
#topbar{
  display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
  border-bottom:1px solid var(--line);background:rgba(10,13,21,.92);
  backdrop-filter:blur(12px);position:relative;z-index:5;
}
#btnMenu,#btnGear{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:var(--sub);flex:none;border-radius:10px}
#btnMenu:active,#btnGear:active{background:var(--surface)}
#titleWrap{flex:1;min-width:0;text-align:center}
#appName{font-family:var(--serif);font-size:11px;letter-spacing:.35em;color:var(--accent);text-transform:uppercase}
#convoTitle{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#moon{width:14px;height:14px;border-radius:50%;flex:none;
  background:radial-gradient(circle at 35% 35%, #2A3350 0%, #1A2133 70%);
  border:1px solid var(--line);position:absolute;left:50%;transform:translateX(-50%);top:calc(env(safe-area-inset-top) + 2px);opacity:0}
#moon.on{opacity:1;animation:phase 2.4s ease-in-out infinite}
@keyframes phase{
  0%{background:radial-gradient(circle at 100% 50%, #E9DFC4 0%, #1A2133 45%)}
  50%{background:radial-gradient(circle at 50% 50%, #E9DFC4 0%, #E9DFC4 55%, #1A2133 90%)}
  100%{background:radial-gradient(circle at 0% 50%, #E9DFC4 0%, #1A2133 45%)}
}

/* ===== chat ===== */
#chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 8px}
.msg{margin-bottom:22px;max-width:100%}
.msg .role{font-family:var(--serif);font-size:11px;letter-spacing:.25em;color:var(--sub);margin-bottom:6px}
.msg.user{display:flex;flex-direction:column;align-items:flex-end}
.msg.user .body{
  background:var(--user-bubble);border:1px solid var(--line);
  border-radius:16px 16px 4px 16px;padding:10px 14px;max-width:88%;
  white-space:pre-wrap;word-break:break-word}
.msg.assistant .body{white-space:pre-wrap;word-break:break-word;padding-right:4px}
.msg .tools{display:flex;gap:14px;margin-top:8px}
.msg .tools button{font-size:12px;color:var(--sub);padding:4px 2px}
.msg .tools button:active{color:var(--accent)}
.errnote{background:rgba(201,123,123,.1);border:1px solid rgba(201,123,123,.35);
  color:var(--danger);border-radius:12px;padding:10px 14px;font-size:14px;margin-bottom:22px}
.errnote button{color:var(--danger);text-decoration:underline;margin-top:6px;font-size:14px}
#empty{color:var(--sub);text-align:center;margin-top:26vh;font-family:var(--serif)}
#empty .big{font-size:22px;letter-spacing:.4em;color:var(--accent);margin-bottom:10px}
#empty .small{font-size:13px;letter-spacing:.1em}

/* ===== input ===== */
#inputbar{
  display:flex;align-items:flex-end;gap:10px;
  padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
  border-top:1px solid var(--line);background:rgba(10,13,21,.92);backdrop-filter:blur(12px)}
#ta{
  flex:1;resize:none;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:11px 14px;max-height:160px;line-height:1.6;outline:none}
#ta:focus{border-color:#37456B}
#btnSend{
  width:42px;height:42px;flex:none;border-radius:50%;
  background:var(--accent);color:#0A0D15;display:flex;align-items:center;justify-content:center;font-size:18px}
#btnSend:disabled{background:var(--surface2);color:var(--sub)}
#btnSend.stop{background:var(--danger);color:#0A0D15}

/* ===== drawer ===== */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10;opacity:0;pointer-events:none;transition:opacity .22s}
#overlay.on{opacity:1;pointer-events:auto}
#drawer{
  position:fixed;top:0;left:0;bottom:0;width:82%;max-width:330px;z-index:11;
  background:var(--surface);border-right:1px solid var(--line);
  transform:translateX(-102%);transition:transform .24s ease;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 18px) 0 calc(env(safe-area-inset-bottom) + 12px)}
#drawer.on{transform:translateX(0)}
#drawer h2{font-family:var(--serif);font-size:13px;letter-spacing:.4em;color:var(--accent);padding:0 20px 14px}
#btnNew{
  margin:0 16px 14px;padding:12px;border:1px solid var(--line);border-radius:14px;
  color:var(--text);text-align:center;background:var(--surface2)}
#btnNew:active{border-color:var(--accent)}
#convoList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.convoItem{display:flex;align-items:center;padding:13px 8px 13px 20px;border-bottom:1px solid rgba(36,45,66,.5)}
.convoItem .name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
.convoItem.cur .name{color:var(--accent)}
.convoItem .del{width:40px;height:40px;color:var(--sub);flex:none;font-size:15px}
#drawerFoot{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
#drawerFoot button{
  padding:12px;border:1px solid var(--line);border-radius:14px;text-align:left;padding-left:16px;color:var(--sub)}
#drawerFoot button:active{color:var(--accent)}

/* ===== sheet(modal) ===== */
#sheetWrap{position:fixed;inset:0;z-index:20;display:none}
#sheetWrap.on{display:block}
#sheetBg{position:absolute;inset:0;background:rgba(0,0,0,.6)}
#sheet{
  position:absolute;left:0;right:0;bottom:0;max-height:88dvh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:var(--surface);border-radius:22px 22px 0 0;border-top:1px solid var(--line);
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px)}
#sheet h3{font-family:var(--serif);font-size:14px;letter-spacing:.35em;color:var(--accent);margin-bottom:18px;text-align:center}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;letter-spacing:.08em}
.field input[type=text],.field input[type=password],.field input[type=number],.field select,.field textarea{
  width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:11px 13px;outline:none}
.field textarea{min-height:110px;resize:vertical;line-height:1.6}
.rowBtns{display:flex;gap:10px;margin-top:6px}
.rowBtns button{
  flex:1;padding:13px;border-radius:14px;border:1px solid var(--line);color:var(--text);background:var(--surface2)}
.rowBtns button.primary{background:var(--accent);color:#0A0D15;border-color:var(--accent)}
.rowBtns button.danger{color:var(--danger);border-color:rgba(201,123,123,.4)}
.hint{font-size:12px;color:var(--sub);line-height:1.6;margin-top:6px}

/* knowledge list */
.kItem{display:flex;align-items:center;gap:10px;padding:13px 4px;border-bottom:1px solid rgba(36,45,66,.5)}
.kItem .kName{flex:1;min-width:0}
.kItem .kName .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}
.kItem .kName .c{font-size:11px;color:var(--sub)}
.toggle{width:46px;height:27px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);position:relative;flex:none;transition:background .18s}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--sub);transition:all .18s}
.toggle.on{background:rgba(200,178,126,.25);border-color:var(--accent)}
.toggle.on::after{left:21px;background:var(--accent)}
.kItem .edit{color:var(--sub);width:40px;height:40px;flex:none}
#kAdd{width:100%;margin-top:14px;padding:13px;border:1px dashed var(--line);border-radius:14px;color:var(--sub)}

/* attach & images */
#btnAttach,#btnSnip{width:38px;height:38px;flex:none;border-radius:50%;border:1px solid var(--line);color:var(--sub);font-size:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
#btnSnip{font-size:17px}
#attachStrip{display:none;gap:8px;padding:8px 14px 0;background:rgba(10,13,21,.92)}
#attachStrip.on{display:flex}
.attachThumb{position:relative}
.attachThumb img{width:54px;height:54px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
.attachThumb button{position:absolute;top:-7px;right:-7px;width:21px;height:21px;border-radius:50%;background:var(--surface2);color:var(--text);font-size:11px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.msg .imgs{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;justify-content:flex-end}
.msg.assistant .imgs{justify-content:flex-start}
.msg.assistant .imgs img{max-width:70vw}
.msg .imgs img{width:130px;max-width:42vw;border-radius:12px;border:1px solid var(--line)}

/* convo search */
#convoSearch{margin:0 16px 12px;padding:10px 13px;background:var(--bg);border:1px solid var(--line);border-radius:12px;outline:none;width:calc(100% - 32px);font-size:16px;color:var(--text)}
.convoItem .snip{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* settings option rows */
.optRow{display:flex;align-items:center;justify-content:space-between;padding:7px 2px;font-size:15px}

/* presets */
#presetRow{display:flex;gap:8px;padding:0 16px 12px}
.pChip{flex:1;padding:9px 2px;border:1px solid var(--line);border-radius:12px;color:var(--sub);font-size:13px;text-align:center;background:var(--surface2)}
.pChip.cur{color:var(--accent);border-color:var(--accent);background:rgba(200,178,126,.12)}

/* header image & avatar */
#chatHead{margin-bottom:16px}
#chatHead img{width:100%;height:130px;object-fit:cover;border-radius:16px;border:1px solid var(--line)}
.bubbleRow{display:flex;align-items:flex-end;gap:8px;max-width:100%;justify-content:flex-end}
.avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(--line);flex:none}

/* thoughts */
.thoughtBox{border-left:2px solid var(--line);padding:7px 11px;margin:2px 0 10px;background:rgba(19,24,38,.55);border-radius:0 12px 12px 0}
.thoughtBox .tHead{font-size:12px;color:var(--sub);letter-spacing:.05em}
.thoughtBox .tBody{font-size:13px;color:var(--sub);white-space:pre-wrap;word-break:break-word;margin-top:6px;line-height:1.75}

/* system note */
.sysnote{font-size:12px;color:var(--sub);text-align:center;margin:0 0 16px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="btnMenu" aria-label="メニュー">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M2 5h16M2 10h16M2 15h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div id="titleWrap">
      <div id="appName">Silente</div>
      <div id="convoTitle">新しい会話</div>
    </div>
    <div id="moon"></div>
    <button id="btnGear" aria-label="設定">
      <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M10 1.8v2.4M10 15.8v2.4M1.8 10h2.4M15.8 10h2.4M4.2 4.2l1.7 1.7M14.1 14.1l1.7 1.7M15.8 4.2l-1.7 1.7M5.9 14.1l-1.7 1.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div id="chat"></div>

  <div id="attachStrip"></div>
  <div id="quickBar" style="display:flex;align-items:center;gap:8px;padding:4px 14px 0;background:rgba(10,13,21,.92)">
    <button id="qbModel" style="border:1px solid var(--line);border-radius:10px;padding:4px 10px;color:var(--accent);font-size:12px;max-width:42%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none">…</button>
    <input id="qbMax" type="number" min="128" max="16384" step="64" style="width:78px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:4px 8px;font-size:16px;color:var(--text);flex:none">
    <span id="costHint" style="flex:1;text-align:right;font-size:11px;color:var(--sub)"></span>
  </div>
  <div id="inputbar">
    <button id="btnAttach" aria-label="画像を添付">＋</button>
    <button id="btnSnip" aria-label="スニペット">⚡</button>
    <textarea id="ta" rows="1" placeholder="メッセージ…"></textarea>
    <button id="btnSend" aria-label="送信">↑</button>
  </div>
</div>
<input type="file" id="imgFile" accept="image/*" multiple style="display:none">

<div id="overlay"></div>
<div id="drawer">
  <h2>SILENTE</h2>
  <button id="btnNew">＋ 新しい会話</button>
  <div id="presetRow"></div>
  <input type="search" id="convoSearch" placeholder="🔍 会話を検索…">
  <div id="convoList"></div>
  <div id="drawerFoot">
    <button id="btnPresets">🍰 プリセット編集</button>
    <button id="btnImageGen">🎨 画像生成</button>
    <button id="btnUsage">💰 使用量</button>
    <button id="btnFavs">🩷 お気に入り</button>
    <button id="btnSched">⏰ 予定メッセージ</button>
    <button id="btnMemory">🌙 メモリ</button>
    <button id="btnKnowledge">📁 ナレッジ</button>
    <button id="btnSettings">⚙ 設定</button>
  </div>
</div>

<div id="sheetWrap">
  <div id="sheetBg"></div>
  <div id="sheet"></div>
</div>

<script>
"use strict";
/* ============ state ============ */
const LSKEY = "silente_v1";
const MODELS = [
  ["claude-fable-5","Fable 5（最高性能）"],
  ["claude-opus-4-8","Opus 4.8"],
  ["claude-opus-4-7","Opus 4.7"],
  ["claude-opus-4-6","Opus 4.6"],
  ["claude-sonnet-4-6","Sonnet 4.6（バランス）"],
  ["claude-haiku-4-5-20251001","Haiku 4.5（速い・安い）"]
];
let S = load();
function defaultPresets(){
  return [
    {id:"p_write",name:"✒️ 執筆",systemPrompt:"",model:"",knowledgeIds:[]},
    {id:"p_aoi",name:"🩵 葵",systemPrompt:"",model:"",knowledgeIds:[]},
    {id:"p_talk",name:"💬 相談",systemPrompt:"",model:"",knowledgeIds:[]}
  ];
}
function defaults(){
  return {
    apiKey:"", model:"claude-sonnet-4-6", defaultProvider:"anthropic", maxTokens:4096, webSearch:false, autoCompact:true,
    geminiKey:"", geminiImageModel:"gemini-2.5-flash-image", openaiKey:"", openaiImageModel:"gpt-image-2", imageProvider:"gemini",
    systemPrompt:"", memory:[{id:"m1",title:"創作について",text:""},{id:"m2",title:"葵について",text:""},{id:"m3",title:"わたしについて",text:""}], knowledge:[], convos:[], currentId:null,
    morning:{on:false,startHour:10,endHour:15}, morningDone:"", usage:{}, favorites:[],
    snippets:[], lastBackup:0, backupNudgeDay:"", charRefs:[],
    ttsVoice:"onyx", ttsInstructions:"", schedules:[], showThoughts:false,
    presets:defaultPresets(), currentPreset:"p_write"
  };
}
function load(){
  try{
    const raw = localStorage.getItem(LSKEY);
    if(!raw) return defaults();
    const s = Object.assign(defaults(), JSON.parse(raw));
    if(typeof s.memory==="string") s.memory=[{id:uid(),title:"メモ",text:s.memory}];
    else if(s.memory && !Array.isArray(s.memory)) s.memory=[
      {id:uid(),title:"創作について",text:s.memory.work||""},
      {id:uid(),title:"葵について",text:s.memory.aoi||""},
      {id:uid(),title:"わたしについて",text:s.memory.me||""}
    ];
    if(!Array.isArray(s.memory)) s.memory=[];
    if(!s.morning) s.morning={on:false,startHour:10,endHour:15};
    if(s.morningDone===undefined) s.morningDone="";
    if(!s.usage) s.usage={};
    if(!Array.isArray(s.favorites)) s.favorites=[];
    if(!Array.isArray(s.snippets)) s.snippets=[];
    if(!s.lastBackup) s.lastBackup=Date.now();
    if(s.backupNudgeDay===undefined) s.backupNudgeDay="";
    if(!Array.isArray(s.charRefs)) s.charRefs=[];
    if(!s.ttsVoice) s.ttsVoice="onyx";
    if(s.ttsInstructions===undefined) s.ttsInstructions="";
    if(!Array.isArray(s.schedules)) s.schedules=[];
    if(s.showThoughts===undefined) s.showThoughts=false;
    if(!Array.isArray(s.presets)||!s.presets.length){
      s.presets=defaultPresets();
      const onIds=(s.knowledge||[]).filter(k=>k.on).map(k=>k.id);
      s.presets[0].systemPrompt=s.systemPrompt||"";
      s.presets[0].knowledgeIds=onIds.slice();
      s.presets[2].knowledgeIds=onIds.slice();
    }
    if(!s.currentPreset || !s.presets.find(p=>p.id===s.currentPreset)) s.currentPreset=s.presets[0].id;
    s.presets.forEach(p=>{
      if(p.provider===undefined||p.provider===null) p.provider="";
      if(p.provider==="anthropic" && !p.model) p.provider="";
    });
    if(!s.defaultProvider) s.defaultProvider="anthropic";
    if(!s.imageProvider) s.imageProvider="gemini";
    if(!s.openaiImageModel) s.openaiImageModel="gpt-image-2";
    const aoi=s.presets.find(p=>p.id==="p_aoi");
    if(aoi && aoi.name==="🌙 葵") aoi.name="🩵 葵";
    return s;
  }catch(e){ return defaults(); }
}
function presetOf(c){
  const pid=(c&&c.presetId)||S.currentPreset;
  return S.presets.find(p=>p.id===pid)||S.presets[0];
}
function resolveModel(c){
  const p=presetOf(c);
  const o=(c&&c.ovr)||{};
  let prov,model;
  if(o.provider){
    prov=o.provider; model=o.model||"";
  }else{
    prov=p.provider||S.defaultProvider||"anthropic";
    model=p.provider?p.model:(S.defaultProvider===prov?S.model:"");
  }
  if(!model){
    if(prov==="openai") model="gpt-5.6";
    else if(prov==="gemini") model="gemini-2.5-flash";
    else model=(S.defaultProvider==="anthropic"&&S.model)?S.model:"claude-sonnet-4-6";
  }
  return {prov:prov,model:model};
}
function reasonOf(c){
  const o=(c&&c.ovr)||{};
  return o.reasoning || presetOf(c).reasoning || "";
}
function save(){
  try{ localStorage.setItem(LSKEY, JSON.stringify(S)); }
  catch(e){ alert("保存に失敗しました。ストレージ容量を確認してね。"); }
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function cur(){ return S.convos.find(c=>c.id===S.currentId) || null; }

/* ============ dom ============ */
const $ = s => document.querySelector(s);
const chatEl=$("#chat"), taEl=$("#ta"), sendBtn=$("#btnSend"),
      drawerEl=$("#drawer"), overlayEl=$("#overlay"),
      sheetWrap=$("#sheetWrap"), sheetEl=$("#sheet"),
      moonEl=$("#moon"), convoTitleEl=$("#convoTitle");

let streaming=false, aborter=null, pendingImages=[], convoQuery="";

/* ============ conversation ============ */
function maybeMemNudge(){
  const c=cur(); if(!c) return false;
  const len=c.messages.filter(m=>!m.hidden).length;
  if(len - (c.memNudgeAt||0) >= 12){
    c.memNudgeAt=len; save();
    if(confirm("このスレッド、けっこう話したね🌙 離れる前にメモリ更新しとく？")){ openMemory(); return true; }
  }
  return false;
}
function newConvo(){
  if(maybeMemNudge()) return;
  const c={id:uid(), title:"新しい会話", messages:[], updated:Date.now(), presetId:S.currentPreset};
  S.convos.unshift(c); S.currentId=c.id; save();
  renderAll(); closeDrawer();
}
function switchConvo(id){
  if(id!==S.currentId && maybeMemNudge()) return;
  S.currentId=id; save(); renderAll(); closeDrawer();
}
function deleteConvo(id){
  const c=S.convos.find(x=>x.id===id);
  if(!confirm(`「${c?c.title:""}」を削除する？`)) return;
  S.convos=S.convos.filter(x=>x.id!==id);
  if(S.currentId===id) S.currentId=S.convos.length?S.convos[0].id:null;
  save(); renderAll();
}
function renameConvo(){
  const c=cur(); if(!c) return;
  const t=prompt("会話のタイトル", c.title);
  if(t&&t.trim()){ c.title=t.trim(); save(); renderAll(); }
}
function openConvoMenu(){
  const c=cur(); if(!c) return;
  openSheet(`
    <h3>この会話</h3>
    <div class="rowBtns" style="margin-bottom:10px"><button id="cmRename">✏️ 名前を変更</button></div>
    <div class="rowBtns" style="margin-bottom:10px"><button id="cmPin">📌 ${c.pinned?"ピン留めを解除":"ピン留め（一覧の上に固定）"}</button></div>
    <div class="rowBtns" style="margin-bottom:10px"><button id="cmExport">⬇️ 会話ぜんぶをファイル化（.md）</button></div>
    <div class="rowBtns" style="margin-bottom:10px"><button id="cmExportLast">⬇️ 最後の返信だけファイル化</button></div>
    <div class="hint" style="margin-bottom:12px">ファイルはiPhoneの「ファイル」アプリに保存される。思い出のアーカイブにも、あとでナレッジに貼り直すのにも使えるよ。</div>
    <div class="rowBtns"><button id="cmClose">閉じる</button></div>
  `);
  $("#cmClose").onclick=closeSheet;
  $("#cmPin").onclick=()=>{ c.pinned=!c.pinned; save(); closeSheet(); renderDrawer(); };
  $("#cmRename").onclick=()=>{ closeSheet(); renameConvo(); };
  $("#cmExport").onclick=()=>{ exportConvoFile(c,false); };
  $("#cmExportLast").onclick=()=>{ exportConvoFile(c,true); };
}
function exportConvoFile(c,lastOnly){
  const p=presetOf(c);
  const msgs=c.messages.filter(m=>!m.hidden);
  const targets=lastOnly ? msgs.filter(m=>m.role==="assistant").slice(-1) : msgs;
  if(!targets.length){ alert("書き出せるメッセージがまだないよ。"); return; }
  let md="# "+c.title+"\n\n";
  targets.forEach(m=>{
    const who=(m.role==="user")?"かのん":p.name;
    md+="**"+who+"**\n\n"+(m.content||"（画像）")+"\n\n---\n\n";
  });
  const blob=new Blob([md],{type:"text/markdown"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(c.title||"conversation").replace(/[\\\/:*?"<>|]/g,"_")+(lastOnly?"-memo":"")+".md";
  document.body.append(a); a.click(); a.remove();
}

/* ============ render ============ */
function renderAll(){ renderTitle(); renderChat(); renderDrawer(); renderPresets(); updateCostHint(); }
function renderTitle(){
  const c=cur();
  convoTitleEl.textContent = c ? c.title : "新しい会話";
  const o=(c&&c.ovr)||{};
  const mark=(o.provider||o.maxTokens||o.reasoning)?" ⚙":"";

}
function renderPresets(){
  const row=$("#presetRow"); row.innerHTML="";
  const c=cur();
  const curId=presetOf(c).id;
  S.presets.forEach(p=>{
    const b=document.createElement("button");
    b.className="pChip"+(p.id===curId?" cur":"");
    b.textContent=p.name;
    b.onclick=()=>{
      S.currentPreset=p.id;
      const cc=cur(); if(cc) cc.presetId=p.id;
      save(); renderAll(); closeDrawer();
    };
    row.append(b);
  });
}
function renderDrawer(){
  const list=$("#convoList"); list.innerHTML="";
  const q=convoQuery.trim().toLowerCase();
  const sorted=S.convos.slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  sorted.forEach(c=>{
    let snippet="";
    if(q){
      const inTitle=c.title.toLowerCase().includes(q);
      const hit=c.messages.find(m=>(m.content||"").toLowerCase().includes(q));
      if(!inTitle && !hit) return;
      if(hit){
        const i=hit.content.toLowerCase().indexOf(q);
        snippet="…"+hit.content.slice(Math.max(0,i-10), i+30)+"…";
      }
    }
    const div=document.createElement("div");
    div.className="convoItem"+(c.id===S.currentId?" cur":"");
    const name=document.createElement("div");
    name.className="name";
    const t=document.createElement("div"); t.textContent=(c.pinned?"📌 ":"")+c.title;
    name.append(t);
    if(snippet){ const sp=document.createElement("div"); sp.className="snip"; sp.textContent=snippet; name.append(sp); }
    name.onclick=()=>switchConvo(c.id);
    const del=document.createElement("button");
    del.className="del"; del.textContent="✕";
    del.onclick=e=>{ e.stopPropagation(); deleteConvo(c.id); };
    div.append(name,del); list.append(div);
  });
}
function renderChat(){
  chatEl.innerHTML="";
  const c=cur();
  const p=presetOf(c);
  if(p.headerImage){
    const h=document.createElement("div"); h.id="chatHead";
    const img=document.createElement("img"); img.src=p.headerImage;
    img.style.objectPosition=p.headerPos||"50% 50%";
    h.append(img); chatEl.append(h);
  }
  if(S.lastBackup && (Date.now()-S.lastBackup)>7*86400000 && S.backupNudgeDay!==todayStr() && S.convos.some(cc=>cc.messages.length>0)){
    const n=document.createElement("div"); n.className="sysnote";
    const a=document.createElement("u"); a.textContent="💾 最後のバックアップから1週間以上。設定から書き出す";
    a.onclick=openSettings;
    const sp=document.createElement("span"); sp.textContent="　あとで"; sp.style.opacity=".7";
    sp.onclick=()=>{ S.backupNudgeDay=todayStr(); save(); n.remove(); };
    n.append(a,sp); chatEl.append(n);
  }
  if(!c || c.messages.length===0){
    const d=document.createElement("div");
    d.id="empty";
    d.innerHTML='<div class="big">LUCE SILENTE</div><div class="small">静かな光の下で、はじめよう</div>';
    chatEl.append(d);
    return;
  }
  c.messages.forEach((m,i)=>{ if(m.hidden) return; chatEl.append(msgEl(m,i)); });
  scrollBottom();
}

  const role=document.createElement("div");
  role.className="role";
  role.textContent = m.role==="user" ? "" : p.name;
  const body=document.createElement("div");
  body.className="body"; body.textContent=m.content;
  wrap.append(role);
  if(m.role==="assistant" && m.thought){
    const tb=document.createElement("div"); tb.className="thoughtBox";
    const th=document.createElement("div"); th.className="tHead"; th.textContent="💭 こころのなか（タップで開く）";
    const tc=document.createElement("div"); tc.className="tBody"; tc.textContent=m.thought; tc.style.display="none";
    th.onclick=()=>{
      const open=tc.style.display==="none";
      tc.style.display=open?"":"none";
      th.textContent=open?"💭 こころのなか（タップで閉じる）":"💭 こころのなか（タップで開く）";
    };

  if(m.images && m.images.length){

    m.images.forEach(im=>{

      img.src="data:"+im.media_type+";base64,"+im.data;

    });
    wrap.append(imgs);

  }else{
    wrap.append(body);
  }
  if(m.role==="assistant"){
    const tools=document.createElement("div"); tools.className="tools";
    const cp=document.createElement("button"); cp.textContent="コピー";
    cp.onclick=()=>{ navigator.clipboard.writeText(m.content).then(()=>{cp.textContent="✓ コピー済"; setTimeout(()=>cp.textContent="コピー",1500);}); };

      S.knowledge.push({id:uid(),title:t.trim(),text:m.content});

      setTimeout(()=>sv.textContent="📁保存",2000);
    };

    const fv=document.createElement("button"); fv.textContent="🩷";
    fv.onclick=()=>{
      S.favorites.push({id:uid(),text:m.content,who:p.name,convo:(cur()||{}).title||"",date:todayStr()});
      save();
      fv.textContent="✓🩷";
      setTimeout(()=>fv.textContent="🩷",1500);
    };

      const rg=document.createElement("button"); rg.textContent="再生成";

      dl.onclick=()=>deleteMessage(idx);
      tools.append(dl);

/* ============ API ============ */
function buildSystem(c){
  const p=presetOf(c);
  let sys="";
  let mem="";
  (S.memory||[]).forEach(sec=>{
    if((sec.text||"").trim()) mem += "\n■"+sec.title+"\n"+sec.text.trim()+"\n";
  });
  if(mem) sys += "【長期メモリ（過去の会話から引き継いだ記憶）】"+mem+"\n";
  sys += (p.systemPrompt||"").trim();
  const on = S.knowledge.filter(k=>(p.knowledgeIds||[]).includes(k.id));
  if(on.length){
    sys += "\n\n以下は参照資料（キャラクター設定・世界観など）。執筆・応答の際は忠実に従うこと。\n";
    on.forEach(k=>{ sys += `\n===【${k.title}】===\n${k.text}\n`; });
  }
  const dn=new Date();
  const wd="日月火水木金土"[dn.getDay()];
  sys += "\n\n【現在日時】"+dn.getFullYear()+"-"+String(dn.getMonth()+1).padStart(2,"0")+"-"+String(dn.getDate()).padStart(2,"0")+"（"+wd+"）・"+timeBand(dn.getHours());
  return sys.trim();
}
function apiMessages(c){
  const msgs=[];
  const startIdx=c.compactIdx||0;
  if(c.summary && startIdx>0){
    msgs.push({role:"user",content:"【これまでの会話の要約（自動圧縮）】\n"+c.summary});
    msgs.push({role:"assistant",content:"（要約を把握した。続きから再開する。）"});
  }
  for(let i=startIdx;i<c.messages.length;i++){
    const m=c.messages[i];
    if(m.role==="user" && m.images && m.images.length){
      const content=m.images.map(im=>({type:"image",source:{type:"base64",media_type:im.media_type,data:im.data}}));
      content.push({type:"text",text:m.content||"（添付した画像を見て）"});
      msgs.push({role:m.role,content});
    }else{
      msgs.push({role:m.role,content:m.content});
    }
  }
  const merged=[];
  msgs.forEach(m=>{
    const last=merged[merged.length-1];
    if(last && last.role===m.role){
      if(typeof last.content==="string" && typeof m.content==="string"){
        last.content+="\n\n"+m.content;
      }else{
        const a=Array.isArray(last.content)?last.content:[{type:"text",text:last.content}];
        const b=Array.isArray(m.content)?m.content:[{type:"text",text:m.content}];
        last.content=a.concat(b);
      }
    }else merged.push({role:m.role,content:m.content});
  });
  if(merged.length && merged[0].role==="assistant") merged.unshift({role:"user",content:"（これまでの続きから）"});
  return merged;
}
function toOpenAIMessages(c,sysText){
  const out=[];
  if(sysText) out.push({role:"system",content:sysText});
  apiMessages(c).forEach(m=>{
    if(Array.isArray(m.content)){
      out.push({role:m.role,content:m.content.map(b=>{
        if(b.type==="image") return {type:"image_url",image_url:{url:"data:"+b.source.media_type+";base64,"+b.source.data}};
        return {type:"text",text:b.text};
      })});
    }else{
      out.push({role:m.role,content:m.content});
    }
  });
  return out;
}
function toGeminiContents(c){
  const out=[];
  apiMessages(c).forEach(m=>{
    const role=(m.role==="assistant")?"model":"user";
    let parts;
    if(Array.isArray(m.content)){
      parts=m.content.map(b=> b.type==="image"
        ? {inlineData:{mimeType:b.source.media_type,data:b.source.data}}
        : {text:b.text});
    }else{
      parts=[{text:m.content}];
    }
    out.push({role:role,parts:parts});
  });
  return out;
}
async function genTitle(c){
  if(!S.apiKey) return;
  const first=c.messages.find(m=>m.role==="user"&&!m.hidden);
  const reply=c.messages.filter(m=>m.role==="assistant").slice(-1)[0];
  if(!first) return;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:40,
        system:"会話の内容を表す短い日本語タイトルを12文字以内で作る。タイトルだけを出力。記号・引用符・句点は付けない。",
        messages:[{role:"user",content:"最初の発言：\n"+first.content.slice(0,500)+(reply?("\n\n返答の冒頭：\n"+reply.content.slice(0,300)):"")}]
      })
    });
    if(!res.ok) return;
    const data=await res.json();
    const uu=data.usage||{};
    addUsage("anthropic","haiku",(uu.input_tokens||0),(uu.output_tokens||0));
    let t=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    t=t.replace(/["「」『』\n]/g,"").slice(0,20);
    if(t){ c.title=t; save(); renderTitle(); renderDrawer(); }
  }catch(e){ /* 失敗時は先頭文字のまま */ }
}
async function maybeCompact(c){
  if(S.autoCompact===false) return;
  const start=c.compactIdx||0;
  const live=c.messages.slice(start);
  const size=live.reduce((n,m)=>n+(m.content||"").length,0);
  if(size<28000 || live.length<=12) return;
  let newStart=c.messages.length-8;
  while(newStart<c.messages.length && c.messages[newStart].role!=="user") newStart++;
  if(newStart<=start || newStart>=c.messages.length) return;
  const part=c.messages.slice(start,newStart);
  let text=part.map(m=>(m.role==="user"?"ユーザー：":"アシスタント：")+(m.content||"（画像）")).join("\n\n");
  if(text.length>24000) text=text.slice(-24000);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:1400,
        system:"あなたは会話の圧縮係。既存の要約と新しい会話ログを統合し、この会話の続きを正しく書くために必要な情報（物語や作業の進行・決定事項・確定した設定・直近の状況・トーン）を保った要約だけを出力する。日本語、1500文字以内。前置きや説明は書かない。",
        messages:[{role:"user",content:"【既存の要約】\n"+(c.summary||"（なし）")+"\n\n【新しいログ】\n"+text+"\n\n統合した要約だけを出力して。"}]
      })
    });
    if(!res.ok) return;
    const data=await res.json();
    const uu=data.usage||{};
    addUsage("anthropic","haiku",(uu.input_tokens||0)+(uu.cache_creation_input_tokens||0),(uu.output_tokens||0));
    const sum=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    if(!sum) return;
    c.summary=sum; c.compactIdx=newStart; save();
    const note=document.createElement("div"); note.className="sysnote";
    note.textContent="🌀 古い履歴を要約に圧縮したよ（表示はそのまま・送信量が軽くなった）";
    chatEl.append(note);
  }catch(e){ /* 圧縮失敗時はそのまま送る */ }
}
async function callAPI(){
  const c=cur(); if(!c) return;
  const rm0=resolveModel(c);
  const needKey = rm0.prov==="openai" ? S.openaiKey : (rm0.prov==="gemini" ? S.geminiKey : S.apiKey);
  if(!needKey){
    const nm = rm0.prov==="openai" ? "OpenAI" : (rm0.prov==="gemini" ? "Gemini" : "Claude");
    showError(nm+"のAPIキーが未設定だよ。⚙設定から入れてね。");
    openSettings(); return;
  }

  streaming=true; setStreamUI(true);
  await maybeCompact(c);
  const asMsg={role:"assistant",content:""};
  const el=msgEl(asMsg,-1); chatEl.append(el);
  const bodyEl=el.querySelector(".body");
  let thoughtEl=null;
  const thoughtBody=()=>{
    if(!thoughtEl){
      thoughtEl=document.createElement("div");
      thoughtEl.className="thoughtBox";
      thoughtEl.innerHTML='<div class="tHead">💭 こころのなか</div><div class="tBody"></div>';
      el.insertBefore(thoughtEl, bodyEl);
    }
    return thoughtEl.querySelector(".tBody");
  };
  const emptyEl=$("#empty"); if(emptyEl) emptyEl.remove();
  scrollBottom();

  aborter=new AbortController();
  let ok=false, errText="", uIn=0, uOut=0;
  try{
    const p=presetOf(c);
    const rm=resolveModel(c);
    const isOA=(rm.prov==="openai"), isGM=(rm.prov==="gemini");
    let sysText=buildSystem(c);
    const maxT=Number((c.ovr||{}).maxTokens)||Number(p.maxTokens)||Number(S.maxTokens)||4096;
    const thinkOn = S.showThoughts && !isOA && (isGM || maxT>=2048);
    if(thinkOn && sysText) sysText+="\n\n（内部の思考も日本語で行うこと）";
    let url,headers,payload;
    if(isOA){
      url="https://api.openai.com/v1/chat/completions";
      headers={
        "content-type":"application/json",
        "authorization":"Bearer "+S.openaiKey
      };
      payload={
        model:rm.model,
        stream:true,
        stream_options:{include_usage:true},
        max_completion_tokens:maxT,
        messages:toOpenAIMessages(c,sysText)
      };
      const rz=reasonOf(c);
      if(rz) payload.reasoning_effort=rz;
    }else if(isGM){
      url="https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(rm.model)+":streamGenerateContent?alt=sse";
      headers={
        "content-type":"application/json",
        "x-goog-api-key":S.geminiKey
      };
      payload={
        contents:toGeminiContents(c),
        generationConfig:{maxOutputTokens:maxT}
      };
      if(thinkOn) payload.generationConfig.thinkingConfig={includeThoughts:true};
      if(sysText) payload.systemInstruction={parts:[{text:sysText}]};
    }else{
      url="https://api.anthropic.com/v1/messages";
      headers={
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      };
      payload={
        model:rm.model,
        max_tokens:maxT,
        stream:true,
        messages:apiMessages(c)
      };
      if(sysText) payload.system=[{type:"text",text:sysText,cache_control:{type:"ephemeral"}}];
      if(thinkOn) payload.thinking={type:"enabled",budget_tokens:Math.max(1024,Math.min(4000,maxT-512))};
      if(S.webSearch) payload.tools=[{type:"web_search_20250305",name:"web_search",max_uses:3}];
    }
    const res=await fetch(url,{
      method:"POST",
      signal:aborter.signal,
      headers:headers,
      body:JSON.stringify(payload)
    });
    if(!res.ok){
      let j=null; try{ j=await res.json(); }catch(e){}
      const t=(j&&j.error&&j.error.message)||("HTTP "+res.status);
      if(res.status===401) errText="認証エラー：APIキーを確認してね（"+t+"）";
      else if(res.status===429) errText="レート上限に到達。少し待ってから再試行してね。";
      else if(res.status===400) errText="リクエストエラー："+t;
      else errText="エラー："+t;
      throw new Error(errText);
    }
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf="";
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");
      buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data:")) continue;
        const data=line.slice(5).trim();
        if(!data) continue;
        if(data==="[DONE]") continue;
        let ev; try{ ev=JSON.parse(data); }catch(e){ continue; }
        if(isOA){
          if(ev.error) throw new Error("APIエラー："+(ev.error.message||""));
          if(ev.usage){ uIn=ev.usage.prompt_tokens||uIn; uOut=ev.usage.completion_tokens||uOut; }
          const piece=(((ev.choices||[])[0]||{}).delta||{}).content||"";
          if(piece){
            asMsg.content+=piece;
            bodyEl.textContent=asMsg.content;
            scrollBottom();
          }
        }else if(isGM){
          if(ev.error) throw new Error("APIエラー："+(ev.error.message||""));
          if(ev.usageMetadata){ uIn=ev.usageMetadata.promptTokenCount||uIn; uOut=ev.usageMetadata.candidatesTokenCount||uOut; }
          const gparts=((((ev.candidates||[])[0]||{}).content||{}).parts)||[];
          let piece="";
          gparts.forEach(pp=>{
            if(pp.thought){ if(pp.text){ asMsg.thought=(asMsg.thought||"")+pp.text; thoughtBody().textContent=asMsg.thought; } }
            else if(pp.text) piece+=pp.text;
          });
          if(piece){
            asMsg.content+=piece;
            bodyEl.textContent=asMsg.content;
            scrollBottom();
          }
        }else if(ev.type==="content_block_delta" && ev.delta && ev.delta.type==="thinking_delta"){
          asMsg.thought=(asMsg.thought||"")+(ev.delta.thinking||"");
          thoughtBody().textContent=asMsg.thought;
          scrollBottom();
        }else if(ev.type==="message_start"){
          const u=(ev.message&&ev.message.usage)||{};
          uIn=(u.input_tokens||0)+(u.cache_creation_input_tokens||0)*1.25+(u.cache_read_input_tokens||0)*0.1;
        }else if(ev.type==="message_delta"){
          if(ev.usage&&ev.usage.output_tokens) uOut=ev.usage.output_tokens;
        }else if(ev.type==="content_block_delta" && ev.delta && ev.delta.type==="text_delta"){
          asMsg.content+=ev.delta.text;
          bodyEl.textContent=asMsg.content;
          scrollBottom();
        }else if(ev.type==="content_block_start" && ev.content_block && ev.content_block.type==="server_tool_use"){
          bodyEl.textContent=asMsg.content+"\n🔍 検索中…";
          scrollBottom();
        }else if(ev.type==="error"){
          throw new Error("APIエラー："+(ev.error&&ev.error.message||""));
        }
      }
    }
    if(uIn||uOut) addUsage(isOA?"openai":(isGM?"gemini":"anthropic"), rm.model, uIn, uOut);
    ok=true;
  }catch(e){
    if(e.name==="AbortError"){ ok=asMsg.content.length>0; }
    else{
      el.remove();
      showError(errText||("通信エラー："+e.message), callAPI);
    }
  }finally{
    streaming=false; setStreamUI(false); aborter=null;
    if(ok && asMsg.content){
      c.messages.push(asMsg);
      c.updated=Date.now();
      if(c.title==="新しい会話"){
        const first=c.messages.find(m=>m.role==="user"&&!m.hidden);
        if(first) c.title=first.content.slice(0,18)+(first.content.length>18?"…":"");
        genTitle(c);
      }
      save(); renderAll();
    }else if(!ok){
      save();
    }
  }
}
function send(){
  if(streaming){ if(aborter) aborter.abort(); return; }
  const text=taEl.value.trim();
  if(!text && !pendingImages.length) return;
  if(text.indexOf("⏰")===0){
    taEl.value=""; taEl.style.height="auto";
    scheduleFromChat(text.replace(/^⏰\s*/,""));
    return;
  }
  if(text.indexOf("🎨")===0 && !pendingImages.length){
    inlineImageGen(text.replace(/^🎨\s*/,""));
    return;
  }
  let c=cur();
  if(!c){ c={id:uid(),title:"新しい会話",messages:[],updated:Date.now()}; S.convos.unshift(c); S.currentId=c.id; }
  const msg={role:"user",content:text};
  if(pendingImages.length){ msg.images=pendingImages.slice(); pendingImages=[]; renderAttachStrip(); }
  c.messages.push(msg);
  c.updated=Date.now(); save();
  taEl.value=""; taEl.style.height="auto";
  renderChat(); renderTitle(); renderDrawer();
  callAPI();
}
function fileToDataURL(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(Math.max(w,h)>maxDim){ const k=maxDim/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.onerror=()=>reject(new Error("画像として読めなかった"));
      img.src=r.result;
    };
    r.onerror=()=>reject(new Error("読み込み失敗"));
    r.readAsDataURL(file);
  });
}
function fileToImage(file,maxDim,quality){
  maxDim=maxDim||1024; quality=quality||0.8;
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(Math.max(w,h)>maxDim){ const k=maxDim/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        const dataUrl=cv.toDataURL("image/jpeg",quality);
        resolve({media_type:"image/jpeg",data:dataUrl.split(",")[1]});
      };
      img.onerror=()=>reject(new Error("画像として読めなかった"));
      img.src=r.result;
    };
    r.onerror=()=>reject(new Error("読み込み失敗"));
    r.readAsDataURL(file);
  });
}
function renderAttachStrip(){

async function extractMemory(){
  const c=cur();
  if(!c||c.messages.length===0){ alert("この会話にはまだメッセージがないよ。"); return; }
  if(!S.apiKey){ alert("Claude APIキーが未設定だよ（抽出はHaikuを使うの）。"); return; }
  const secs=S.memory||[];
  if(!secs.length){ alert("メモリ項目がまだないよ。まず「＋項目を追加」してね。"); return; }
  const btn=$("#mExtract");
  btn.textContent="抽出中…"; btn.disabled=true;
  let transcript="";
  for(let i=c.messages.length-1;i>=0;i--){
    const m=c.messages[i];
    const line=(m.role==="user"?"ユーザー：":"アシスタント：")+(m.content||"（画像）")+"\n\n";
    if(transcript.length+line.length>12000) break;
    transcript=line+transcript;
  }
  const getField=id=>{ const t=sheetEl.querySelector('[data-mtext="'+id+'"]'); return t?t.value:""; };
  const curMem=secs.map(sec=>"==="+sec.title+"===\n"+(getField(sec.id)||"（空）")).join("\n");
  const titles=secs.map(sec=>"==="+sec.title+"===").join("\n");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:2400,
        system:"あなたは長期メモリの編集係。既存メモリ（複数項目）と会話ログを統合し、更新後のメモリを出力する。各項目の意味は見出し名から判断する（例：「灯について」ならアシスタント灯の人格・約束・確定事項、「わたしについて」ならユーザー本人の好み・状況・価値観）。出力は必ず既存と同じ見出しを、同じ順で、すべて使うこと：\n"+titles+"\nルール：日本語、箇条書き中心、各項目800文字以内。一時的な話題や挨拶は入れない。古くなった項目は書き換え、重複は統合。既存の有用な内容は勝手に削除しない。該当する新情報がない項目は既存の内容をそのまま出力。前置きや説明は一切書かない。",
        messages:[{role:"user",content:"【既存メモリ】\n"+curMem+"\n\n【会話ログ】\n"+transcript+"\n\n更新後のメモリを指定の見出し形式で出力して。"}]
      })
    });
    if(!res.ok){
      let j=null; try{ j=await res.json(); }catch(e){}
      throw new Error((j&&j.error&&j.error.message)||("HTTP "+res.status));
    }
    const data=await res.json();
    const uu=data.usage||{};
    addUsage("anthropic","haiku",(uu.input_tokens||0)+(uu.cache_creation_input_tokens||0),(uu.output_tokens||0));
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    const out={};
    const parts=text.split(/===\s*(.+?)\s*===/);
    for(let i=1;i<parts.length;i+=2){ out[parts[i]]=(parts[i+1]||"").trim(); }
    let hit=false;
    secs.forEach(sec=>{
      if(out[sec.title]!==undefined){
        const t=sheetEl.querySelector('[data-mtext="'+sec.id+'"]');
        if(t){ t.value=out[sec.title]; hit=true;
          const mc=sheetEl.querySelector('[data-mc="'+sec.id+'"]');
          if(mc) mc.textContent=out[sec.title].length.toLocaleString();
        }
      }
    });
    if(!hit) throw new Error("応答の形式が読み取れなかった。もう一度試してみて。");
  }catch(e){
    alert("抽出に失敗："+e.message);
  }finally{
    btn.textContent="🌙 この会話から更新"; btn.disabled=false;
  }
}

      : "width:100%;height:96px;object-fit:cover;border-radius:12px;border:1px solid var(--line);touch-action:none;display:block";

      drag=true; img.setPointerCapture(e.pointerId);
      sx=e.clientX; sy=e.clientY;
      const cur2=(w[posKey]||"50% 50%").split(" ").map(v=>parseFloat(v));
      px=cur2[0]; py=cur2[1];
      e.preventDefault();
    };
    img.onpointermove=e=>{
      if(!drag) return;

    };
    img.onpointerup=img.onpointercancel=()=>{ drag=false; };

function b64ToBlob(b64,mime){
  const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

async function generateImageCore(prompt, refs, qVal, signal){
  const prov=S.imageProvider||"gemini";
  if(prov==="openai" && !S.openaiKey) throw new Error("OpenAIのAPIキーを⚙設定に入力してね。");
  if(prov!=="openai" && !S.geminiKey) throw new Error("GeminiのAPIキーを⚙設定に入力してね。");
  if(prov==="openai"){
    let res;
    if(refs && refs.length){
      const fd=new FormData();
      fd.append("model",S.openaiImageModel||"gpt-image-2");
      fd.append("prompt",prompt);
      fd.append("quality",qVal||"medium");
      fd.append("size","1024x1024");
      refs.forEach((r,i)=>{ fd.append("image[]", b64ToBlob(r.data,r.media_type), "ref"+i+".jpg"); });
      res=await fetch("https://api.openai.com/v1/images/edits",{
        method:"POST", signal:signal,
        headers:{"authorization":"Bearer "+S.openaiKey},
        body:fd
      });
    }else{
      res=await fetch("https://api.openai.com/v1/images/generations",{
        method:"POST", signal:signal,
        headers:{"content-type":"application/json","authorization":"Bearer "+S.openaiKey},
        body:JSON.stringify({
          model:S.openaiImageModel||"gpt-image-2",
          prompt:prompt,
          quality:qVal||"medium",
          size:"1024x1024"
        })
      });
    }
    if(!res.ok){
      let j=null; try{ j=await res.json(); }catch(e){}
      throw new Error((j&&j.error&&j.error.message)||("HTTP "+res.status));
    }
    const data=await res.json();
    const b64=(((data.data||[])[0])||{}).b64_json;
    if(!b64) throw new Error("画像が返らなかった。⚙設定のGPT画像モデル名を確認してみて。");
    addImgCost("openai",qVal||"medium");
    return "data:image/png;base64,"+b64;
  }else{
    const model=S.geminiImageModel||"gemini-2.5-flash-image";
    const parts=(refs||[]).map(r=>({inlineData:{mimeType:r.media_type,data:r.data}}));
    parts.push({text:prompt});
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(model)+":generateContent",{
      method:"POST", signal:signal,
      headers:{"content-type":"application/json","x-goog-api-key":S.geminiKey},
      body:JSON.stringify({contents:[{parts:parts}]})
    });
    if(!res.ok){
      let j=null; try{ j=await res.json(); }catch(e){}
      throw new Error((j&&j.error&&j.error.message)||("HTTP "+res.status));
    }
    const data=await res.json();
    const rparts=(((data.candidates||[])[0]||{}).content||{}).parts||[];
    const imgPart=rparts.find(p=>(p.inlineData&&p.inlineData.data)||(p.inline_data&&p.inline_data.data));
    if(!imgPart){
      const txt=rparts.filter(p=>p.text).map(p=>p.text).join(" ");
      throw new Error(txt?("画像が返らなかった："+txt.slice(0,200)):"画像が返らなかった。⚙設定のモデル名を確認してみて。");
    }
    const d=imgPart.inlineData||imgPart.inline_data;
    const mime=d.mimeType||d.mime_type||"image/png";
    addImgCost("gemini","");
    return "data:"+mime+";base64,"+d.data;
  }
}

async function buildImagePrompt(ctx, req, signal){
  if(!S.apiKey) return req;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", signal:signal,
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:400,
        system:"あなたは画像生成プロンプトの作成係。与えられた会話の文脈と指示から、その場面を描くための画像生成プロンプトを1つだけ出力する。登場人物の外見・服装・雰囲気、場所、構図、光、画風を具体的に。会話に出てきた描写を忠実に拾う。前置きや説明なし、プロンプト本文のみを出力。",
        messages:[{role:"user",content:"【会話の文脈】\n"+ctx+"\n\n【指示】"+req+"\n\n画像生成プロンプトだけを出力して。"}]
      })
    });
    if(!res.ok) return req;
    const data=await res.json();
    const uu=data.usage||{};
    addUsage("anthropic","haiku",(uu.input_tokens||0),(uu.output_tokens||0));
    const t=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
    return t||req;
  }catch(e){ return req; }
}
async function inlineImageGen(req){
  let c=cur();
  if(!c){ c={id:uid(),title:"新しい会話",messages:[],updated:Date.now(),presetId:S.currentPreset}; S.convos.unshift(c); S.currentId=c.id; }
  c.messages.push({role:"user",content:"🎨 "+req});
  c.updated=Date.now(); save();
  taEl.value=""; taEl.style.height="auto";
  renderChat(); renderTitle(); renderDrawer();
  streaming=true; setStreamUI(true);
  aborter=new AbortController();
  const ph=msgEl({role:"assistant",content:"🎨 文脈を読んでる…"},-1);
  chatEl.append(ph); scrollBottom();
  const phBody=ph.querySelector(".body");
  try{
    let ctx="";
    const msgs=c.messages.filter(m=>!m.hidden);
    for(let i=msgs.length-2;i>=0;i--){
      const line=(msgs[i].role==="user"?"ユーザー：":"アシスタント：")+(msgs[i].content||"（画像）")+"\n\n";
      if(ctx.length+line.length>6000) break;
      ctx=line+ctx;
    }
    const prompt=await buildImagePrompt(ctx, req, aborter.signal);
    const hay=req+" "+prompt;
    const matched=(S.charRefs||[]).filter(cr=>cr.name && hay.indexOf(cr.name)>=0);
    let refs=[];
    matched.forEach(cr=>(cr.images||[]).forEach(im=>refs.push(im)));
    refs=refs.slice(0,4);
    phBody.textContent="🎨 生成中…（"+((S.imageProvider||"gemini")==="openai"?"GPT":"Gemini")
      +(matched.length?("・参照："+matched.map(cr=>cr.name).join("・")):"")+"・10〜60秒）";
    scrollBottom();
    const dataUrl=await generateImageCore(prompt, refs, "medium", aborter.signal);
    const small=await dataURLResize(dataUrl, 720, 0.72);
    const b64=small.split(",")[1];
    c.messages.push({
      role:"assistant",
      content:"🎨「"+req.slice(0,40)+(req.length>40?"…":"")+"」の画像だよ。長押しで写真に保存できる。",
      images:[{media_type:"image/jpeg",data:b64}]
    });
    c.updated=Date.now(); save();
    renderChat();
  }catch(e){
    ph.remove();
    if(e.name!=="AbortError") showError("画像生成に失敗："+e.message);
    renderChat();
  }finally{
    streaming=false; setStreamUI(false); aborter=null;
    updateCostHint();
  }
}
function dataURLResize(dataUrl,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(Math.max(w,h)>maxDim){ const k=maxDim/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      resolve(cv.toDataURL("image/jpeg",quality));
    };
    img.onerror=()=>reject(new Error("画像処理に失敗"));
    img.src=dataUrl;
  });
}

/* ============ usage tracking ============ */
function usageDay(){
  const d=todayStr();
  if(!S.usage) S.usage={};
  if(!S.usage[d]) S.usage[d]={};
  return S.usage[d];
}
function estCost(prov,model,inTok,outTok){
  const m=(model||"").toLowerCase();
  let rIn=3,rOut=15;
  if(prov==="anthropic"){
    if(m.indexOf("opus")>=0||m.indexOf("fable")>=0){rIn=5;rOut=25;}
    else if(m.indexOf("haiku")>=0){rIn=1;rOut=5;}
    else{rIn=3;rOut=15;}
  }else if(prov==="openai"){
    if(m.indexOf("luna")>=0){rIn=1;rOut=6;}
    else if(m.indexOf("terra")>=0){rIn=2.5;rOut=15;}
    else if(m.indexOf("5.6")>=0||m.indexOf("5.5")>=0){rIn=5;rOut=30;}
    else if(m.indexOf("5.4")>=0){rIn=2.5;rOut=15;}
    else if(m.indexOf("4o")>=0){rIn=2.5;rOut=10;}
    else{rIn=2.5;rOut=15;}
  }else{
    if(m.indexOf("pro")>=0){rIn=1.25;rOut=10;}
    else{rIn=0.3;rOut=2.5;}
  }
  return (inTok*rIn+outTok*rOut)/1e6;
}
function addUsage(prov,model,inTok,outTok){
  const d=usageDay();
  d[prov+"_in"]=(d[prov+"_in"]||0)+Math.round(inTok||0);
  d[prov+"_out"]=(d[prov+"_out"]||0)+Math.round(outTok||0);
  d.cost=(d.cost||0)+estCost(prov,model,inTok||0,outTok||0);
  save();
}
function addImgCost(prov,quality){
  const d=usageDay();
  const key="img_"+prov+(prov==="openai"?("_"+quality):"");
  d[key]=(d[key]||0)+1;
  const c = prov==="openai" ? ({low:0.006,medium:0.053,high:0.211}[quality]||0.053) : 0.039;
  d.cost=(d.cost||0)+c;
  save();
}
function openUsage(){

  const days=S.usage||{};
  const t=todayStr(), month=t.slice(0,7);

    const o={};

      const d=days[k]||{};
      Object.keys(d).forEach(key=>{ o[key]=(o[key]||0)+d[key]; });
    });
    return o;
  };
  const fmt=o=>{
    const rows=[];
    const line=(label,i,ot)=>{ if(i||ot) rows.push(label+"：入力 "+Math.round(i||0).toLocaleString()+" ／ 出力 "+Math.round(ot||0).toLocaleString()+" tok"); };
    line("Claude",o.anthropic_in,o.anthropic_out);

    if(o.tts_chars) rows.push("読み上げ："+Math.round(o.tts_chars).toLocaleString()+" 文字");
    if(!rows.length) rows.push("まだ記録がないよ");
    const usd=o.cost||0;
    rows.push("概算コスト：約 "+Math.round(usd*155).toLocaleString()+" 円（$"+usd.toFixed(3)+"）");
    return rows.map(r=>'<div class="hint" style="margin-top:5px">'+esc(r)+'</div>').join("");
  };
  const monthKeys=Object.keys(days).filter(k=>k.indexOf(month)===0);
  const stMB=(JSON.stringify(S).length*2/1048576);
  const stPct=Math.min(100,Math.round(stMB/5*100));
  const stColor=stMB>4?"var(--danger)":(stMB>3?"#C8B27E":"var(--sub)");
  const storageHtml=`
    <div class="field"><label>端末ストレージ（画像・会話・設定の合計）</label>
      <div style="height:10px;border-radius:5px;background:var(--bg);border:1px solid var(--line);overflow:hidden">
        <div style="height:100%;width:${stPct}%;background:${stColor}"></div>
      </div>
      <div class="hint" style="color:${stColor}">約 ${stMB.toFixed(2)} MB ／ 上限の目安 5 MB${stMB>4?"　⚠️そろそろ整理を（古い会話の削除・画像の見直し）":""}</div>
    </div>`;
  openSheet(`
    <h3>使用量</h3>
    <div class="field"><label>今日（${t.slice(5)}）</label>${fmt(agg([t]))}</div>
    <div class="field"><label>今月（${month.slice(5)}月）</label>${fmt(agg(monthKeys))}</div>
    ${storageHtml}
    <div class="hint" style="margin-bottom:12px">※コストはアプリ側の概算（1ドル155円換算・料金表は目安）。正確な請求額は各社のダッシュボードで確認してね。<br><br>💡 <b>Geminiの無料枠について</b>：課金を有効にしていないGeminiキーは自動的に無料枠で動く。上限に達するとエラーで止まるだけで、<b>勝手に課金されることはない</b>よ。だから無料のまま使いたければ、Google Cloudで課金を有効にしないこと。ここの概算に金額が出ても、無料枠内なら実際の請求は0円。上限エラーが出たら「今日の無料分おしまい」の合図。</div>
    <div class="rowBtns">
      <button id="uReset" class="danger">記録をリセット</button>
      <button id="uClose">閉じる</button>
    </div>
  `);
  $("#uClose").onclick=closeSheet;
  $("#uReset").onclick=()=>{
    if(!confirm("使用量の記録をぜんぶ消す？（実際の請求には影響しないよ）")) return;
    S.usage={}; save(); openUsage();
  };
}

function wrapCanvasText(ctx,text,maxW){
  const lines=[];
  text.split("\n").forEach(para=>{
    let line="";
    for(const ch of para){
      if(line && ctx.measureText(line+ch).width>maxW){ lines.push(line); line=ch; }
      else line+=ch;
    }
    lines.push(line);
  });
  return lines;
}
function favCardDataURL(f){
  const W=1080;
  let text=f.text;
  if(text.length>360) text=text.slice(0,360)+"…";
  let fs=46;
  const mctx=document.createElement("canvas").getContext("2d");
  mctx.font=fs+'px "Hiragino Mincho ProN","Yu Mincho",serif';
  let lines=wrapCanvasText(mctx,text,W-220);
  if(lines.length>13){
    fs=36;
    mctx.font=fs+'px "Hiragino Mincho ProN","Yu Mincho",serif';
    lines=wrapCanvasText(mctx,text,W-220);
  }
  const lh=Math.round(fs*1.9);
  const H=Math.max(1080, 400+lines.length*lh+280);
  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0A0D15"); g.addColorStop(1,"#1B2340");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(let i=0;i<26;i++){
    const x=40+Math.random()*(W-80), y=40+Math.random()*(H-80);
    ctx.fillStyle="rgba(229,233,242,"+(0.15+Math.random()*0.35)+")";
    const s=Math.random()<0.7?2:3;
    ctx.fillRect(x,y,s,s);
  }
  const mc=document.createElement("canvas"); mc.width=220; mc.height=220;
  const mcx=mc.getContext("2d");
  mcx.fillStyle="#E9DFC4";
  mcx.beginPath(); mcx.arc(110,110,64,0,Math.PI*2); mcx.fill();
  mcx.globalCompositeOperation="destination-out";
  mcx.beginPath(); mcx.arc(140,98,60,0,Math.PI*2); mcx.fill();
  ctx.drawImage(mc, W/2-110, 80);
  ctx.fillStyle="#E5E9F2";
  ctx.font=fs+'px "Hiragino Mincho ProN","Yu Mincho",serif';
  ctx.textAlign="center";
  let y=430;
  lines.forEach(l=>{ ctx.fillText(l, W/2, y); y+=lh; });
  ctx.fillStyle="#C8B27E";
  ctx.font='31px "Hiragino Mincho ProN","Yu Mincho",serif';
  ctx.fillText("— "+f.who+"　"+f.date, W/2, y+64);
  ctx.fillStyle="rgba(135,146,168,.9)";
  ctx.font='24px "Hiragino Mincho ProN",serif';
  ctx.fillText("L U C E   S I L E N T E", W/2, H-72);
  return cv.toDataURL("image/png");
}

/* ============ cost hint ============ */
function updateCostHint(){
  const el=$("#costHint"); if(!el) return;
  const c=cur();
  if(!c){ el.textContent=""; return; }
  try{
    const rm=resolveModel(c);
    const p=presetOf(c);
    const mb=$("#qbModel");
    if(mb) mb.textContent=rm.model.replace(/^claude-/,"").replace(/-20\d{6,}$/,"");
    const mx=$("#qbMax");
    if(mx && document.activeElement!==mx) mx.value=Number((c.ovr||{}).maxTokens)||Number(p.maxTokens)||Number(S.maxTokens)||4096;
    const sys=buildSystem(c);
    let hist=0;
    const start=c.compactIdx||0;
    for(let i=start;i<c.messages.length;i++){
      hist+=(c.messages[i].content||"").length;
      if(c.messages[i].images) hist+=c.messages[i].images.length*1200;
    }
    if(c.summary && start>0) hist+=c.summary.length;
    const inTok=sys.length+hist+taEl.value.length;
    const outTok=Math.min(Number(p.maxTokens)||Number(S.maxTokens)||4096, 1000);
    const usd=estCost(rm.prov,rm.model,inTok,outTok);
    const yen=usd*155;
    el.textContent="この1通の目安：" + (yen<1 ? "1円未満" : "約"+Math.round(yen)+"円") + "（キャッシュ割引前）";
  }catch(e){ el.textContent=""; }
}

/* ============ text to speech ============ */
let ttsAudio=null;
async function speakText(text, btn){
  if(!S.openaiKey){ alert("読み上げにはOpenAIのAPIキーが必要だよ（⚙設定）。"); return; }
  if(!ttsAudio) ttsAudio=new Audio();
  ttsAudio.pause();
  ttsAudio.play().catch(()=>{});
  const orig=btn?btn.textContent:"";
  if(btn){ btn.textContent="⏳"; btn.disabled=true; }
  try{
    const body={
      model:"gpt-4o-mini-tts",
      voice:S.ttsVoice||"onyx",
      input:text.slice(0,2000),
      response_format:"mp3"
    };
    if((S.ttsInstructions||"").trim()) body.instructions=S.ttsInstructions.trim();
    const res=await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{"content-type":"application/json","authorization":"Bearer "+S.openaiKey},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      let j=null; try{ j=await res.json(); }catch(e){}
      throw new Error((j&&j.error&&j.error.message)||("HTTP "+res.status));
    }
    const blob=await res.blob();
    const d=usageDay();
    d.tts_chars=(d.tts_chars||0)+Math.min(text.length,2000);
    d.cost=(d.cost||0)+Math.min(text.length,2000)*15/1e6;
    save();
    ttsAudio.src=URL.createObjectURL(blob);
    await ttsAudio.play();
    if(btn){
      btn.textContent="⏸";
      btn.disabled=false;
      btn.onclick=()=>{
        if(ttsAudio.paused){ ttsAudio.play(); btn.textContent="⏸"; }
        else{ ttsAudio.pause(); btn.textContent="▶"; }
      };
      ttsAudio.onended=()=>{ btn.textContent=orig; btn.onclick=()=>speakText(text,btn); };
    }
  }catch(e){
    alert("読み上げに失敗："+e.message);
    if(btn){ btn.textContent=orig; btn.disabled=false; }
  }
}

      s.at=at; s.note=note; s.presetId=$("#scP").value; s.done=false; s.snooze=0;
    }else{
      S.schedules.push({id:uid(),at:at,note:note,presetId:$("#scP").value,convoId:s.convoId||"",done:false,snooze:0});
    }
    save(); closeSheet();
    alert("⏰ 予定を保存したよ。時間になったら（閉じてた時は次に開いた時に）声をかけるね。");
  };
}
async function scheduleFromChat(req){
  const c=cur();
  const base={convoId:c?c.id:"", presetId:c?(c.presetId||S.currentPreset):S.currentPreset};
  if(!c||!c.messages.length||!S.apiKey){ editSchedule(base); return; }
  openSheet('<h3>予定メッセージ</h3><div class="hint">🕐 会話から日時ときっかけを読み取ってる…</div>');
  try{
    let ctx="";
    const msgs=c.messages.filter(m=>!m.hidden);
    for(let i=msgs.length-1;i>=0;i--){
      const line=(msgs[i].role==="user"?"ユーザー：":"アシスタント：")+(msgs[i].content||"")+"\n\n";
      if(ctx.length+line.length>4000) break;
      ctx=line+ctx;
    }
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "content-type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:150,
        system:"会話とユーザーの要望から、予定メッセージの日時ときっかけを抽出する。現在日時は「"+nowStr()+"」。「明日」「今夜」などは現在日時から計算。時刻が不明なら12:00とする。出力はJSONのみ、他の文字は一切書かない：{\"at\":\"YYYY-MM-DDTHH:MM\",\"note\":\"きっかけを20字以内\"}",
        messages:[{role:"user",content:"【会話】\n"+ctx+"\n\n【要望】"+(req||"直近で話していた日・約束の日時に")}]
      })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    const uu=data.usage||{};
    addUsage("anthropic","haiku",(uu.input_tokens||0),(uu.output_tokens||0));
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
    const j=JSON.parse(text);
    if(!j.at||isNaN(new Date(j.at).getTime())) throw new Error("日時が読めなかった");
    editSchedule({at:j.at, note:(j.note||"約束").slice(0,20), convoId:base.convoId, presetId:base.presetId});
  }catch(e){
    editSchedule(base);
  }
}
function deliverSchedule(s){
  s.done=true; save();
  let c = s.convoId ? S.convos.find(x=>x.id===s.convoId) : null;
  if(!c){
    c={id:uid(),title:"⏰ "+s.note.slice(0,14),messages:[],updated:Date.now(),presetId:s.presetId||S.currentPreset};
    S.convos.unshift(c);
  }
  S.currentId=c.id;
  c.messages.push({role:"user",hidden:true,content:"（システム：約束していた日時になったよ。きっかけ：「"+s.note+"」。現在日時："+nowStr()+"。この約束を踏まえて、あなたからメッセージを送って。定型文にならない、今この瞬間のあなた自身の言葉で。）"});
  c.updated=Date.now(); save();
  closeSheet(); renderAll(); callAPI();
}
function checkSchedules(){
  if(streaming) return;
  if(sheetWrap.classList.contains("on")) return;
  const now=Date.now();
  const due=(S.schedules||[]).find(s=>!s.done && (!s.snooze||s.snooze<now) && new Date(s.at).getTime()<=now);
  if(!due) return;
  if(confirm("⏰「"+due.note+"」の時間だよ！メッセージを受け取る？")){
    deliverSchedule(due);
  }else{
    due.snooze=now+30*60000; save();
  }
}

/* ============ utils ============ */
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;"); }

});

/* ============ init ============ */
if(!S.convos.length) { S.convos.push({id:uid(),title:"新しい会話",messages:[],updated:Date.now()}); S.currentId=S.convos[0].id; save(); }
if(!S.currentId) S.currentId=S.convos[0].id;
renderAll();
if(!S.apiKey){ setTimeout(openSettings, 400); }
else{ setTimeout(checkMorning, 400); }
setTimeout(checkSchedules, 1500);
setInterval(checkSchedules, 30000);
